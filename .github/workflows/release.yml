name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac-arm64:
    name: macOS arm64 (Apple Silicon DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build macOS arm64 DMG
        run: npm run electron:build:mac -- --publish always --arch arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-x64:
    name: macOS x64 (Intel DMG)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build macOS x64 DMG
        run: npm run electron:build:mac -- --publish always --arch x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Windows (NSIS installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Windows installer
        run: npm run electron:build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Linux AppImage
        run: npm run electron:build:linux -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release Completeness
    needs: [build-mac-arm64, build-mac-x64, build-win, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build results
        run: |
          echo "macOS arm64: ${{ needs.build-mac-arm64.result }}"
          echo "macOS x64: ${{ needs.build-mac-x64.result }}"
          echo "Windows: ${{ needs.build-win.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          
          if [ "${{ needs.build-mac-arm64.result }}" != "success" ] || \
             [ "${{ needs.build-mac-x64.result }}" != "success" ] || \
             [ "${{ needs.build-win.result }}" != "success" ] || \
             [ "${{ needs.build-linux.result }}" != "success" ]; then
            echo "❌ One or more builds failed!"
            exit 1
          fi
          echo "✅ All builds completed successfully!"
